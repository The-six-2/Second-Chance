<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Contact | Second Hand</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef3ff;
}

/* Navigation */

nav{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(12px);
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    z-index:1000;
}

.logo{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(45deg,#6C63FF,#00C6FF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:.3s;
}

nav ul li a:hover{
    color:#6C63FF;
}



/* Header */

.header{
    height:300px;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("contact2.jpg");
    background-size:cover;
    background-position:center 35%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.header h1{
    font-size:55px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

/* Contact Section */

.container{
    width:90%;
    max-width:1200px;
    margin:60px auto;
    display:grid;
   
    grid-template-columns:1fr 1fr;
    gap:40px;
}

    background: white;

    display: flex;

.image-box img{
    width: 85%;
    height: 85%;
    object-fit: contain;
}
*/
.info{
    width: 100%
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.info h2{
    margin-bottom:25px;
    color:#4F46E5;
}

.info p{
    margin:18px 0;
    font-size:17px;
}

.form{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.form h2{
    margin-bottom:20px;
    color:#4F46E5;
}

.form input,
.form textarea{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

.form input:focus,
.form textarea:focus{
    border-color:#4F46E5;
}

.form textarea{
    height:150px;
    resize:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#4F46E5,#06B6D4);
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

/* Footer */

footer{
    background:#1F2937;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

.header h1{
    font-size:40px;
}

nav{
    flex-direction:column;
}

nav ul{
    margin-top:15px;
}

}

</style>

</head>
